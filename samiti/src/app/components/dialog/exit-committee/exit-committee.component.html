<h2 mat-dialog-title>Exit Committee</h2>
<mat-dialog-content>
  <p>Are you sure you want to exit <strong>{{ data.committeeName }}</strong>?</p>
  <p class="warning-text">You will no longer be a member of this committee.</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()" [disabled]="isLoading()">Cancel</button>
  <button mat-raised-button color="warn" (click)="onConfirm()" [disabled]="isLoading()">
    @if (isLoading()) {
      <mat-spinner diameter="20"></mat-spinner>
    } @else {
      Exit
    }
  </button>
</mat-dialog-actions>
