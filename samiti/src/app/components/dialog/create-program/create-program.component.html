<div class="drawer-layout-shell">

  <mat-toolbar class="drawer-synchronized-header">
    <div class="drawer-title-group">
      <mat-icon class="mode-indicator-icon">event_note</mat-icon>
      <h2>Create New Program</h2>
    </div>
    <button mat-icon-button type="button" class="drawer-close-btn" (click)="onCancel()" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
  </mat-toolbar>

  <div class="dialog-body">
    <form class="create-program-form">

      <!-- PROGRAM NAME -->
      <div class="form-row-full">
        <mat-form-field appearance="outline" class="samiti-custom-field">
          <mat-label>Program Name</mat-label>
          <input matInput [(ngModel)]="programName" name="programName" placeholder="Ex. Aarti Ceremony" required>
          <mat-icon matPrefix>event_note</mat-icon>
        </mat-form-field>
      </div>

      <!-- DESCRIPTION -->
      <div class="form-row-full">
        <mat-form-field appearance="outline" class="samiti-custom-field">
          <mat-label>Description</mat-label>
          <textarea matInput [(ngModel)]="description" name="description" placeholder="Enter program description..." rows="3"></textarea>
          <mat-icon matPrefix>description</mat-icon>
        </mat-form-field>
      </div>

      <!-- START DATE TIME & END DATE TIME -->
      <div class="form-row-split-grid">
        <mat-form-field appearance="outline" class="samiti-custom-field">
          <mat-label>Start Date Time</mat-label>
          <input matInput [matDatepicker]="startPicker" [(ngModel)]="startDateTime" name="startDateTime" required>
          <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
          <mat-datepicker #startPicker></mat-datepicker>
          <mat-icon matPrefix>schedule</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="samiti-custom-field">
          <mat-label>End Date Time</mat-label>
          <input matInput [matDatepicker]="endPicker" [(ngModel)]="endDateTime" name="endDateTime" required>
          <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
          <mat-datepicker #endPicker></mat-datepicker>
          <mat-icon matPrefix>schedule</mat-icon>
        </mat-form-field>
      </div>

      <div class="form-row-full">
        <mat-form-field appearance="outline" class="samiti-custom-field">
          <mat-label>Address</mat-label>
          <input matInput [(ngModel)]="address" name="address" placeholder="Committee address" disabled>
          <mat-icon matPrefix>place</mat-icon>
        </mat-form-field>
      </div>

      <div class="form-row-split-grid">
        <mat-form-field appearance="outline" class="samiti-custom-field" subscriptSizing="dynamic">
          <mat-label>Latitude</mat-label>
          <input matInput [(ngModel)]="latitude" name="latitude" type="number" placeholder="Auto-detected" disabled>
          <mat-icon matPrefix>my_location</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="samiti-custom-field" subscriptSizing="dynamic">
          <mat-label>Longitude</mat-label>
          <input matInput [(ngModel)]="longitude" name="longitude" type="number" placeholder="Auto-detected" disabled>
          <mat-icon matPrefix>explore</mat-icon>
        </mat-form-field>
      </div>

    </form>
  </div>

  <footer class="drawer-action-footer">
    <button mat-button type="button" class="btn-cancel-flat" (click)="onCancel()">Cancel</button>
    <button mat-flat-button
            type="button"
            class="submit-action-btn"
            [disabled]="!isFormValid || isSubmitting()"
            (click)="onSubmit()">
      <mat-icon>add</mat-icon>
      <span>{{ isSubmitting() ? 'Creating...' : 'Create Program' }}</span>
    </button>
  </footer>

</div>
